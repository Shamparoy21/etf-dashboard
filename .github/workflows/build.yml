name: Build ETF Dashboard

on:
  workflow_dispatch:           # Manual run button
  schedule:
    - cron: '0 * * * *'        # Hourly (UTC). Change if you like.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps chromium

      - name: Build data JSON
        run: |
          python scripts/fetch_and_build.py

      - name: Commit & Push data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/data.json history/*.json || true
          git commit -m "Auto-update ETF data" || echo "No changes"
          git push
